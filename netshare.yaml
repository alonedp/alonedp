port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  nameserver:
    - https://dns.alidns.com/dns-query

proxies:
  - name: "NetShare"
    type: http
    server: 192.168.49.1
    port: 8282

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "NetShare"

rules:
  - MATCH,PROXY
