port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
geodata-mode: false

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  mtu: 1500
  dns-hijack:
    - any:53

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: redir-host
  nameserver:
    - 223.5.5.5
    - 1.1.1.1
  fallback:
    - 8.8.8.8

proxies:
  - name: "NetShare"
    type: http
    server: 192.168.49.1
    port: 8282

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - "NetShare"

rules:
  - MATCH,PROXY
