port: 7890
socks-port: 7891
mixed-port: 7897
allow-lan: true
mode: rule
log-level: warning
geodata-mode: false

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

proxies:
  - name: "NetShare"
    type: http
    server: 192.168.49.1
    port: 8282

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - NetShare

rules:
  - MATCH,PROXY
